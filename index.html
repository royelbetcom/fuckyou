<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c0f;
    --surface:   #10141a;
    --panel:     #151b24;
    --border:    #1f2d3d;
    --amber:     #f5a623;
    --amber-dim: #c07d10;
    --amber-glow:#f5a62322;
    --red:       #e84545;
    --green:     #2ecc71;
    --blue:      #3498db;
    --text:      #d4dde8;
    --muted:     #5a6a7e;
    --mono:      'Share Tech Mono', monospace;
    --body:      'Barlow', sans-serif;
    --display:   'Barlow Condensed', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCANLINE ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .app-wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--amber);
    padding-bottom: 16px;
    margin-bottom: 36px;
    animation: fadeDown .5s ease both;
  }

  .header-left h1 {
    font-family: var(--display);
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber);
    text-shadow: 0 0 24px var(--amber-dim);
    line-height: 1;
  }

  .header-left p {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.12em;
  }

  .header-stats {
    display: flex;
    gap: 24px;
  }

  .stat-chip {
    text-align: center;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 8px 18px;
    border-radius: 2px;
  }

  .stat-chip .num {
    font-family: var(--display);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--amber);
    line-height: 1;
  }

  .stat-chip .lbl {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 28px;
    animation: fadeUp .5s .1s ease both;
  }

  .tab-btn {
    flex: 1;
    padding: 11px 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: var(--display);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    border-radius: 1px;
  }

  .tab-btn:hover { color: var(--text); border-color: var(--muted); }
  .tab-btn.active {
    background: var(--amber-glow);
    border-color: var(--amber);
    color: var(--amber);
    box-shadow: 0 0 12px var(--amber-glow);
  }

  /* ── PANELS ── */
  .panel {
    display: none;
    animation: fadeUp .3s ease both;
  }
  .panel.active { display: block; }

  /* ── FORM CARD ── */
  .form-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--amber);
    padding: 28px 32px 32px;
    border-radius: 2px;
  }

  .form-card h2 {
    font-family: var(--display);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .form-card h2::before {
    content: '';
    display: block;
    width: 4px; height: 16px;
    background: var(--amber);
    border-radius: 1px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field label {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .field input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 2px var(--amber-glow);
  }

  .field input::placeholder { color: var(--muted); opacity: .5; }

  .form-actions { display: flex; gap: 12px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 10px 24px;
    font-family: var(--display);
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }

  .btn-primary {
    background: var(--amber);
    color: #000;
  }
  .btn-primary:hover { background: #ffc044; box-shadow: 0 0 18px var(--amber-dim); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover { border-color: var(--muted); color: var(--text); }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
  }
  .btn-danger:hover { background: var(--red); color: #fff; }

  .btn-edit {
    background: transparent;
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 5px 14px;
    font-size: 0.72rem;
  }
  .btn-edit:hover { background: var(--blue); color: #fff; }

  .btn-del {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 5px 14px;
    font-size: 0.72rem;
  }
  .btn-del:hover { background: var(--red); color: #fff; }

  /* ── SEARCH BAR ── */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .search-bar input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.88rem;
    border-radius: 2px;
    outline: none;
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--amber); }

  .search-bar select {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  /* ── TABLE ── */
  .table-wrapper {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--amber);
    border-radius: 2px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  thead tr {
    background: var(--surface);
  }

  thead th {
    padding: 13px 16px;
    text-align: left;
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: #ffc044; }
  thead th .sort-icon { margin-left: 4px; opacity: .4; font-size: 0.6rem; }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(245,166,35,0.04); }

  tbody td {
    padding: 12px 16px;
    font-family: var(--body);
    color: var(--text);
  }

  td.id-cell {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 0.82rem;
  }

  td.marks-cell {
    font-family: var(--mono);
    font-weight: 600;
  }

  td.actions-cell { text-align: right; }

  .grade-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  .grade-A\+ { background: rgba(46,204,113,.15); color: #2ecc71; border: 1px solid rgba(46,204,113,.3); }
  .grade-A   { background: rgba(46,204,113,.1);  color: #27ae60; border: 1px solid rgba(46,204,113,.2); }
  .grade-B   { background: rgba(52,152,219,.12); color: #3498db; border: 1px solid rgba(52,152,219,.3); }
  .grade-C   { background: rgba(245,166,35,.12); color: #f5a623; border: 1px solid rgba(245,166,35,.3); }
  .grade-D   { background: rgba(230,126,34,.12); color: #e67e22; border: 1px solid rgba(230,126,34,.3); }
  .grade-F   { background: rgba(232,69,69,.12);  color: #e84545; border: 1px solid rgba(232,69,69,.3); }

  .marks-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .marks-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    min-width: 60px;
  }

  .marks-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .6s ease;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: .3;
  }

  .empty-state p {
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
  }

  /* ── TOAST ── */
  #toast-container {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 9998;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: var(--panel);
    border-left: 3px solid var(--amber);
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text);
    border-radius: 2px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    animation: slideIn .3s ease both;
    max-width: 320px;
  }

  .toast.success { border-color: var(--green); }
  .toast.error   { border-color: var(--red); }
  .toast.fade-out { animation: fadeOut .3s ease both; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--amber);
    padding: 32px;
    width: 100%;
    max-width: 480px;
    border-radius: 2px;
    animation: fadeUp .25s ease both;
  }

  .modal h3 {
    font-family: var(--display);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 24px;
  }

  .modal .form-grid { grid-template-columns: 1fr 2fr 1fr; }
  .modal .modal-actions { display: flex; gap: 12px; margin-top: 20px; }

  /* ── REPORT PANEL ── */
  .report-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .report-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .report-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .report-card.rc-total::before  { background: var(--amber); }
  .report-card.rc-avg::before    { background: var(--blue); }
  .report-card.rc-pass::before   { background: var(--green); }
  .report-card.rc-fail::before   { background: var(--red); }
  .report-card.rc-top::before    { background: #9b59b6; }

  .report-card .rc-val {
    font-family: var(--display);
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .report-card.rc-total .rc-val { color: var(--amber); }
  .report-card.rc-avg .rc-val   { color: var(--blue); }
  .report-card.rc-pass .rc-val  { color: var(--green); }
  .report-card.rc-fail .rc-val  { color: var(--red); }
  .report-card.rc-top .rc-val   { color: #9b59b6; font-size: 1.5rem; }

  .report-card .rc-lbl {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .grade-dist {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--amber);
    padding: 24px 28px;
    border-radius: 2px;
  }

  .grade-dist h3 {
    font-family: var(--display);
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 20px;
  }

  .grade-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
  }

  .grade-row .glbl {
    font-family: var(--mono);
    font-size: 0.75rem;
    width: 24px;
    color: var(--muted);
  }

  .grade-row .gbar {
    flex: 1;
    height: 10px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .grade-row .gfill { height: 100%; border-radius: 2px; transition: width .8s ease; }
  .grade-row .gcnt {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    width: 30px;
    text-align: right;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(24px); }
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 680px) {
    header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .form-grid, .modal .form-grid { grid-template-columns: 1fr; }
    .tabs { flex-wrap: wrap; }
    .marks-bar { display: none; }
  }
</style>
</head>
<body>

<div class="app-wrapper">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1>Student Management</h1>
      <p>// SYSTEM CONSOLE &nbsp;·&nbsp; SESSION ACTIVE &nbsp;·&nbsp; <span id="clock"></span></p>
    </div>
    <div class="header-stats">
      <div class="stat-chip">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">Students</div>
      </div>
      <div class="stat-chip">
        <div class="num" id="stat-avg">—</div>
        <div class="lbl">Avg. Marks</div>
      </div>
      <div class="stat-chip">
        <div class="num" id="stat-pass">0</div>
        <div class="lbl">Passing</div>
      </div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('add')">＋ Add Student</button>
    <button class="tab-btn" onclick="switchTab('list')">▤ All Students</button>
    <button class="tab-btn" onclick="switchTab('search')">⌕ Search</button>
    <button class="tab-btn" onclick="switchTab('report')">◈ Analytics</button>
  </div>

  <!-- PANEL: ADD -->
  <div class="panel active" id="panel-add">
    <div class="form-card">
      <h2>Register New Student</h2>
      <div class="form-grid">
        <div class="field">
          <label>Student ID</label>
          <input type="number" id="add-id" placeholder="e.g. 101" min="1">
        </div>
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="add-name" placeholder="e.g. Alice Johnson">
        </div>
        <div class="field">
          <label>Marks (0–100)</label>
          <input type="number" id="add-marks" placeholder="e.g. 87.5" min="0" max="100" step="0.1">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="addStudent()">⊕ Add Student</button>
        <button class="btn btn-ghost" onclick="clearAddForm()">↺ Clear</button>
      </div>
    </div>
  </div>

  <!-- PANEL: LIST -->
  <div class="panel" id="panel-list">
    <div class="search-bar">
      <input type="text" id="list-search" placeholder="Filter by name or ID…" oninput="renderTable()">
      <select id="sort-select" onchange="renderTable()">
        <option value="id-asc">ID ↑</option>
        <option value="id-desc">ID ↓</option>
        <option value="name-asc">Name A→Z</option>
        <option value="name-desc">Name Z→A</option>
        <option value="marks-desc">Marks ↓</option>
        <option value="marks-asc">Marks ↑</option>
      </select>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Marks</th>
            <th>Grade</th>
            <th>Progress</th>
            <th style="text-align:right">Actions</th>
          </tr>
        </thead>
        <tbody id="student-tbody"></tbody>
      </table>
      <div id="empty-list" class="empty-state" style="display:none">
        <div class="icon">⊘</div>
        <p>NO RECORDS FOUND</p>
      </div>
    </div>
    <div id="table-footer" style="margin-top:10px; font-family:var(--mono); font-size:0.72rem; color:var(--muted);"></div>
  </div>

  <!-- PANEL: SEARCH -->
  <div class="panel" id="panel-search">
    <div class="form-card">
      <h2>Search Student by ID</h2>
      <div style="display:flex; gap:12px; margin-bottom:20px;">
        <div class="field" style="flex:1">
          <label>Student ID</label>
          <input type="number" id="search-id" placeholder="Enter exact ID…" min="1" onkeydown="if(event.key==='Enter')searchStudent()">
        </div>
        <div style="display:flex; align-items:flex-end;">
          <button class="btn btn-primary" onclick="searchStudent()">⌕ Search</button>
        </div>
      </div>
      <div id="search-result"></div>
    </div>
  </div>

  <!-- PANEL: REPORT -->
  <div class="panel" id="panel-report">
    <div class="report-grid" id="report-cards"></div>
    <div class="grade-dist">
      <h3>Grade Distribution</h3>
      <div id="grade-dist-bars"></div>
    </div>
  </div>

</div><!-- /.app-wrapper -->

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✎ Update Student</h3>
    <div class="form-grid">
      <div class="field">
        <label>Student ID</label>
        <input type="number" id="edit-id" readonly style="opacity:.5;cursor:not-allowed">
      </div>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="edit-name" placeholder="New name">
      </div>
      <div class="field">
        <label>Marks (0–100)</label>
        <input type="number" id="edit-marks" placeholder="New marks" min="0" max="100" step="0.1">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveEdit()">✔ Save Changes</button>
      <button class="btn btn-ghost" onclick="closeModal()">✕ Cancel</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<script>
// ─── DATA LAYER ───────────────────────────────────────────────────────────────
let students = JSON.parse(localStorage.getItem('sms_students') || '[]');

function save() {
  localStorage.setItem('sms_students', JSON.stringify(students));
  updateHeaderStats();
}

function genId() {
  if (!students.length) return 101;
  return Math.max(...students.map(s => s.id)) + 1;
}

// ─── GRADE LOGIC ─────────────────────────────────────────────────────────────
function getGrade(m) {
  if (m >= 90) return 'A+';
  if (m >= 80) return 'A';
  if (m >= 70) return 'B';
  if (m >= 60) return 'C';
  if (m >= 50) return 'D';
  return 'F';
}

function gradeColor(g) {
  return { 'A+': '#2ecc71', 'A': '#27ae60', 'B': '#3498db', 'C': '#f5a623', 'D': '#e67e22', 'F': '#e84545' }[g] || '#888';
}

// ─── HEADER STATS ─────────────────────────────────────────────────────────────
function updateHeaderStats() {
  const n = students.length;
  document.getElementById('stat-total').textContent = n;
  if (n === 0) {
    document.getElementById('stat-avg').textContent = '—';
    document.getElementById('stat-pass').textContent = '0';
    return;
  }
  const avg = students.reduce((s, x) => s + x.marks, 0) / n;
  document.getElementById('stat-avg').textContent = avg.toFixed(1);
  document.getElementById('stat-pass').textContent = students.filter(s => s.marks >= 50).length;
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'list')   renderTable();
  if (name === 'report') renderReport();
}

// ─── ADD STUDENT ──────────────────────────────────────────────────────────────
function addStudent() {
  const id    = parseInt(document.getElementById('add-id').value);
  const name  = document.getElementById('add-name').value.trim();
  const marks = parseFloat(document.getElementById('add-marks').value);

  if (!id || id < 1)          return toast('Student ID must be a positive number.', 'error');
  if (!name)                   return toast('Name cannot be empty.', 'error');
  if (isNaN(marks) || marks < 0 || marks > 100) return toast('Marks must be between 0 and 100.', 'error');
  if (students.find(s => s.id === id)) return toast(`ID ${id} already exists.`, 'error');

  students.push({ id, name, marks });
  save();
  toast(`✔ ${name} added successfully.`, 'success');
  clearAddForm();
  renderTable();
}

function clearAddForm() {
  ['add-id','add-name','add-marks'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('add-id').focus();
}

// ─── DELETE STUDENT ───────────────────────────────────────────────────────────
function deleteStudent(id) {
  const s = students.find(x => x.id === id);
  if (!confirm(`Delete student "${s.name}" (ID: ${id})?`)) return;
  students = students.filter(x => x.id !== id);
  save();
  toast(`✔ Student ID ${id} deleted.`, 'success');
  renderTable();
}

// ─── EDIT MODAL ───────────────────────────────────────────────────────────────
function openEdit(id) {
  const s = students.find(x => x.id === id);
  if (!s) return;
  document.getElementById('edit-id').value    = s.id;
  document.getElementById('edit-name').value  = s.name;
  document.getElementById('edit-marks').value = s.marks;
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

function saveEdit() {
  const id    = parseInt(document.getElementById('edit-id').value);
  const name  = document.getElementById('edit-name').value.trim();
  const marks = parseFloat(document.getElementById('edit-marks').value);

  if (!name)                    return toast('Name cannot be empty.', 'error');
  if (isNaN(marks) || marks < 0 || marks > 100) return toast('Marks must be between 0 and 100.', 'error');

  const s = students.find(x => x.id === id);
  s.name  = name;
  s.marks = marks;
  save();
  closeModal();
  toast(`✔ Student ID ${id} updated.`, 'success');
  renderTable();
}

// ─── RENDER TABLE ─────────────────────────────────────────────────────────────
function renderTable() {
  const query = (document.getElementById('list-search')?.value || '').toLowerCase();
  const sort  = document.getElementById('sort-select')?.value || 'id-asc';

  let data = students.filter(s =>
    s.name.toLowerCase().includes(query) ||
    String(s.id).includes(query)
  );

  const [key, dir] = sort.split('-');
  data.sort((a, b) => {
    let va = key === 'name' ? a.name.toLowerCase() : a[key];
    let vb = key === 'name' ? b.name.toLowerCase() : b[key];
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById('student-tbody');
  const empty = document.getElementById('empty-list');
  const footer = document.getElementById('table-footer');

  tbody.innerHTML = '';

  if (!data.length) {
    empty.style.display = 'block';
    footer.textContent = '';
    return;
  }

  empty.style.display = 'none';
  footer.textContent = `Showing ${data.length} of ${students.length} record(s)`;

  data.forEach((s, i) => {
    const grade = getGrade(s.marks);
    const color = gradeColor(grade);
    const tr = document.createElement('tr');
    tr.style.animationDelay = `${i * 0.03}s`;
    tr.style.animation = 'rowIn .3s ease both';
    tr.innerHTML = `
      <td class="id-cell">#${s.id}</td>
      <td>${escHtml(s.name)}</td>
      <td class="marks-cell" style="color:${color}">${s.marks.toFixed(2)}</td>
      <td><span class="grade-badge grade-${grade}">${grade}</span></td>
      <td>
        <div class="marks-bar-wrap">
          <div class="marks-bar">
            <div class="marks-bar-fill" style="width:${s.marks}%;background:${color}"></div>
          </div>
        </div>
      </td>
      <td class="actions-cell">
        <button class="btn btn-edit" onclick="openEdit(${s.id})">✎ Edit</button>
        <button class="btn btn-del" onclick="deleteStudent(${s.id})" style="margin-left:6px">✕ Del</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function searchStudent() {
  const id = parseInt(document.getElementById('search-id').value);
  const result = document.getElementById('search-result');

  if (!id) { result.innerHTML = ''; return; }

  const s = students.find(x => x.id === id);
  if (!s) {
    result.innerHTML = `<div style="font-family:var(--mono);font-size:0.8rem;color:var(--red);padding:16px 0;">
      ✘ No student found with ID ${id}.</div>`;
    return;
  }

  const grade = getGrade(s.marks);
  const color = gradeColor(grade);
  result.innerHTML = `
    <div style="background:var(--bg);border:1px solid var(--border);border-left:3px solid ${color};
                padding:20px 24px;border-radius:2px;animation:fadeUp .3s ease both;">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-family:var(--display);font-size:1.5rem;font-weight:700;color:var(--text)">${escHtml(s.name)}</div>
          <div style="font-family:var(--mono);font-size:0.72rem;color:var(--muted);margin-top:4px">ID: #${s.id}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--display);font-size:2.2rem;font-weight:800;color:${color};line-height:1">${s.marks.toFixed(2)}</div>
          <span class="grade-badge grade-${grade}">${grade}</span>
        </div>
      </div>
      <div style="margin-top:16px">
        <div class="marks-bar" style="height:8px;min-width:unset">
          <div class="marks-bar-fill" style="width:${s.marks}%;background:${color}"></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn btn-edit" onclick="openEdit(${s.id})">✎ Edit</button>
        <button class="btn btn-del" onclick="deleteStudent(${s.id});document.getElementById('search-result').innerHTML=''">✕ Delete</button>
      </div>
    </div>`;
}

// ─── REPORT ───────────────────────────────────────────────────────────────────
function renderReport() {
  const n    = students.length;
  const avg  = n ? (students.reduce((s, x) => s + x.marks, 0) / n) : 0;
  const pass = students.filter(s => s.marks >= 50).length;
  const fail = n - pass;
  const top  = n ? students.reduce((a, b) => a.marks >= b.marks ? a : b) : null;

  document.getElementById('report-cards').innerHTML = `
    <div class="report-card rc-total">
      <div class="rc-val">${n}</div>
      <div class="rc-lbl">Total Students</div>
    </div>
    <div class="report-card rc-avg">
      <div class="rc-val">${n ? avg.toFixed(1) : '—'}</div>
      <div class="rc-lbl">Average Marks</div>
    </div>
    <div class="report-card rc-pass">
      <div class="rc-val">${pass}</div>
      <div class="rc-lbl">Passing (≥50)</div>
    </div>
    <div class="report-card rc-fail">
      <div class="rc-val">${fail}</div>
      <div class="rc-lbl">Failing</div>
    </div>
    <div class="report-card rc-top">
      <div class="rc-val">${top ? escHtml(top.name.split(' ')[0]) : '—'}</div>
      <div class="rc-lbl">Top Student ${top ? '('+top.marks.toFixed(1)+')' : ''}</div>
    </div>`;

  const grades = ['A+','A','B','C','D','F'];
  const counts = {};
  grades.forEach(g => counts[g] = students.filter(s => getGrade(s.marks) === g).length);
  const maxCount = Math.max(...Object.values(counts), 1);
  const colors = { 'A+': '#2ecc71', 'A': '#27ae60', 'B': '#3498db', 'C': '#f5a623', 'D': '#e67e22', 'F': '#e84545' };

  document.getElementById('grade-dist-bars').innerHTML = grades.map(g => `
    <div class="grade-row">
      <span class="glbl" style="color:${colors[g]}">${g}</span>
      <div class="gbar">
        <div class="gfill" style="width:${(counts[g]/maxCount*100).toFixed(1)}%;background:${colors[g]}"></div>
      </div>
      <span class="gcnt">${counts[g]}</span>
    </div>`).join('');
}

// ─── EXPORT CSV ───────────────────────────────────────────────────────────────
function exportCSV() {
  if (!students.length) return toast('No data to export.', 'error');
  const rows = ['ID,Name,Marks,Grade', ...students.map(s =>
    `${s.id},"${s.name}",${s.marks},${getGrade(s.marks)}`)].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows);
  a.download = 'students.csv';
  a.click();
  toast('✔ CSV exported.', 'success');
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.classList.add('fade-out');
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toTimeString().slice(0, 8);
}
setInterval(updateClock, 1000);
updateClock();

// ─── ESCAPE HTML ─────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── CLOSE MODAL ON OVERLAY CLICK ────────────────────────────────────────────
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── KEYBOARD: ESC CLOSES MODAL ──────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateHeaderStats();

// Seed demo data if empty
if (!students.length) {
  const demo = [
    { id: 101, name: 'Alice Johnson',  marks: 94.5 },
    { id: 102, name: 'Bob Smith',      marks: 73.0 },
    { id: 103, name: 'Carol Williams', marks: 88.0 },
    { id: 104, name: 'David Brown',    marks: 55.5 },
    { id: 105, name: 'Eva Martinez',   marks: 41.0 },
    { id: 106, name: 'Frank Lee',      marks: 67.5 },
  ];
  demo.forEach(s => students.push(s));
  save();
}
</script>
